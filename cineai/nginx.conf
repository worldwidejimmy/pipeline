# Production nginx config for OVH server + Cloudflare
#
# Assumptions:
#   - Cloudflare handles SSL termination (Full mode — not Full Strict)
#   - nginx listens on port 80 (Cloudflare sends HTTP internally)
#   - Frontend built to /home/user/cineai/frontend/dist/
#   - Backend uvicorn running on localhost:8001
#   - Your domain: cineai.yourdomain.com (update below)
#
# Deploy:
#   sudo cp nginx.conf /etc/nginx/sites-available/cineai
#   sudo ln -s /etc/nginx/sites-available/cineai /etc/nginx/sites-enabled/cineai
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name cineai.yourdomain.com;   # ← CHANGE THIS

    # Security headers (Cloudflare adds more, but belt-and-suspenders)
    add_header X-Content-Type-Options   nosniff;
    add_header X-Frame-Options          SAMEORIGIN;
    add_header Referrer-Policy          strict-origin-when-cross-origin;

    # Frontend static files
    root /home/user/cineai/frontend/dist;
    index index.html;

    # SPA — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static assets — cache aggressively (Vite adds content hashes to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy → FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;

        # Critical for SSE: disable ALL buffering
        proxy_buffering          off;
        proxy_cache              off;
        proxy_set_header Connection          '';
        proxy_set_header X-Accel-Buffering   no;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # SSE connections stay open — extend timeouts significantly
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;
    }

    # Attu (Milvus UI) — internal access only, remove if not needed
    location /attu/ {
        # Restrict to your IP — replace with your IP or remove block entirely
        # allow  203.0.113.0/24;
        # deny   all;
        proxy_pass http://127.0.0.1:5160/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
