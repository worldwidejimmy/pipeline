# Nginx config for the containerised frontend (serves static files,
# proxies /api/* to the backend container)
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — all non-file routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;

        # SSE-specific headers — must disable buffering
        proxy_buffering          off;
        proxy_cache              off;
        proxy_set_header Connection          '';
        proxy_set_header X-Accel-Buffering   no;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;

        # Long timeouts for SSE streams
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }
}
