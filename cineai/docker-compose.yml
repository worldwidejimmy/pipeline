services:

  # ── Vector database stack ──────────────────────────────────────────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.9
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "127.0.0.1:19530:19530"   # gRPC — loopback only (no public Milvus access)
      - "127.0.0.1:9091:9091"     # HTTP / health checks — loopback only
    depends_on:
      etcd:  { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  attu:
    image: zilliz/attu:v2.4
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "127.0.0.1:5160:3000"     # Milvus admin UI — loopback only (use an SSH tunnel)
    depends_on:
      - milvus
    restart: unless-stopped

  # ── Application stack ──────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8001"   # loopback only — reached via the frontend container + nginx
    env_file:
      - ./backend/.env
    environment:
      MILVUS_URI: http://milvus:19530   # override to use internal service name
    volumes:
      - ./backend/docs:/app/docs:ro    # mount markdown corpus for ingest
      - ./backend/data:/app/data       # scraped reviews (jsonl) for ingest_ebert
    depends_on:
      milvus: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5174:80"       # loopback only — host nginx proxies to it
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
